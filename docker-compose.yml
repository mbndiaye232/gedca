# Stack complète GEDCA — mode on-premise / dev
# Lancer : docker compose up --build

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gedca-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Exposé sur 5434 côté hôte (5432 et 5433 squattés par les Postgres natifs Windows)
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gedca-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gedca-api
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      MASTER_KEY: ${MASTER_KEY}
      STORAGE_ROOT: ${STORAGE_ROOT}
      QUARANTINE_PATH: ${QUARANTINE_PATH}
      WORKER_TEMP_DIR: ${WORKER_TEMP_DIR}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB}
      AI_PROVIDER: ${AI_PROVIDER}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - ./backend:/app
      - storage_data:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gedca-worker
    command: ["celery", "-A", "app.worker", "worker", "--loglevel=info", "--concurrency=${CELERY_WORKER_CONCURRENCY}"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY}
      MASTER_KEY: ${MASTER_KEY}
      STORAGE_ROOT: ${STORAGE_ROOT}
      QUARANTINE_PATH: ${QUARANTINE_PATH}
      WORKER_TEMP_DIR: ${WORKER_TEMP_DIR}
      AI_PROVIDER: ${AI_PROVIDER}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      WATCHER_ROOT: ${WATCHER_ROOT}
      WATCHER_ENABLED: ${WATCHER_ENABLED}
      WATCHER_FORCE_POLLING: ${WATCHER_FORCE_POLLING}
      IMAP_POLL_INTERVAL_MIN: ${IMAP_POLL_INTERVAL_MIN}
    volumes:
      - ./backend:/app
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gedca-beat
    command: ["celery", "-A", "app.worker", "beat", "--loglevel=info"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: gedca-frontend
    command: ["npm", "run", "dev", "--", "--host"]
    environment:
      VITE_API_URL: ${VITE_API_URL}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  storage_data:
