# =============================================================================
# Blueprint Render — Soft GEDCAP (SaaS cloud)
#
# Démarrage économique : **API seule + Redis (gratuit)**.
# Le worker Celery et le beat (OCR, indexation full-text, alertes de retard
# programmées, relève IMAP) sont commentés en bas de fichier — décommentez-les
# quand vous voulez activer ces fonctions (ils ajoutent 2 services payants).
#
# Toutes les variables sont posées directement sur le service `gedcap-api`,
# donc demandées dès la création du blueprint (pas de groupe à remplir après).
#
# La base PostgreSQL existe déjà : coller son « Internal Database URL » dans
# DATABASE_URL (le schéma postgres:// est auto-corrigé en postgresql+asyncpg://).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Redis — broker Celery (gratuit). Gardé même sans worker : l'API y dépose
  # les tâches d'ingestion sans erreur ; elles seront traitées dès qu'un worker
  # sera activé.
  # ---------------------------------------------------------------------------
  - type: redis
    name: gedcap-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

  # ---------------------------------------------------------------------------
  # API FastAPI (web) — migre la base puis démarre uvicorn.
  # ---------------------------------------------------------------------------
  - type: web
    name: gedcap-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/health
    dockerCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
    envVars:
      - key: DEPLOYMENT_MODE
        value: saas
      - key: DATABASE_URL
        sync: false           # Internal Database URL de la base Render existante
      - key: MASTER_KEY
        sync: false           # clé AES-256 base64 (32 octets)
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false           # domaine Cloudflare Pages EN PREMIER (sert d'URL des liens email)
      - key: STORAGE_BACKEND
        value: r2
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: AI_PROVIDER
        value: anthropic       # 'ollama' indisponible sur Render (pas de GPU)
      - key: ANTHROPIC_API_KEY
        sync: false            # laisser vide si non utilisé
      - key: VOYAGE_API_KEY
        sync: false            # embeddings full-text — laisser vide si non utilisé
      - key: LOG_LEVEL
        value: INFO
      - key: REDIS_URL
        fromService:
          type: redis
          name: gedcap-redis
          property: connectionString

